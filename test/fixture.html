<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>page-pilot iframe test fixture</title>
</head>
<body>
  <button id="top-btn">Top button</button>
  <a id="mousedown-only-link" href="javascript:void(0)">Only responds to mousedown</a>
  <button id="dup-btn">First</button>
  <button id="dup-btn">Second</button>
  <button id="dup-btn">Third</button>
  <button id="stale-btn">Loading...</button>
  <button>Text Only</button>
  <button>Same Text</button>
  <button>Same Text</button>
  <button id="reload-iframe-from-outside">Reload iframe (from outside)</button>
  <iframe id="test-iframe" src="/test/iframe-fixture.html" style="width:300px; height:200px; border:1px solid #ccc;"></iframe>

  <div style="position:relative; height:60px;">
    <button id="covered-btn" style="position:absolute; left:10px; top:10px; width:100px; height:40px;">Behind modal</button>
    <div id="modal-backdrop" style="position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:500000; display:none;">
      <button id="modal-close-btn" style="position:absolute; left:20px; top:20px;">Close modal</button>
    </div>
  </div>

  <button id="icon-btn"><span id="icon-inner">&#9654;</span> Button with inner icon</button>

  <script>
    // Simulates a real modal: a full-screen backdrop that sits on top of
    // (and blocks real mouse access to) whatever's behind it, until
    // dismissed. #covered-btn is only reachable by a real click once this
    // is hidden. Starts closed — tests that need it open call
    // showModalBackdrop() explicitly, the way a real modal would only
    // appear in response to something.
    window.showModalBackdrop = () => { document.getElementById('modal-backdrop').style.display = 'block'; };
    document.getElementById('modal-close-btn').addEventListener('click', () => {
      document.getElementById('modal-backdrop').style.display = 'none';
    });
    window.__coveredBtnClicked = false;
    document.getElementById('covered-btn').addEventListener('click', () => {
      window.__coveredBtnClicked = true;
    });
    window.__iconBtnClicked = false;
    document.getElementById('icon-btn').addEventListener('click', () => {
      window.__iconBtnClicked = true;
    });
  </script>

  <script type="module">
    import { PagePilot } from '/page-pilot.js';
    window.PagePilot = PagePilot;

    // Simulates a real-world UI pattern (dropdown menus, tab switches,
    // admin dashboard frameworks) that binds its actual behavior to
    // mousedown for snappier interaction, instead of click.
    window.__mousedownLinkFired = false;
    document.getElementById('mousedown-only-link').addEventListener('mousedown', () => {
      window.__mousedownLinkFired = true;
    });

    // Simulates a button OUTSIDE the iframe (on the top-level page) that
    // causes the iframe to navigate/reload its own content — e.g. a
    // "refresh" control on the parent page, or a <form target="iframe-name">
    // submission. The top page's own URL never changes.
    document.getElementById('reload-iframe-from-outside').addEventListener('click', () => {
      setTimeout(() => {
        document.getElementById('test-iframe').src = '/test/iframe-fixture-2.html';
      }, 200);
    });

    // Simulates a common real-world SPA pattern: clicking triggers an async
    // update that removes the old element some time later (not instantly).
    document.getElementById('stale-btn').addEventListener('click', () => {
      setTimeout(() => {
        document.getElementById('stale-btn').remove();
        const fresh = document.createElement('button');
        fresh.id = 'fresh-btn';
        fresh.textContent = 'Ready!';
        document.body.appendChild(fresh);
      }, 300);
    });
  </script>
</body>
</html>
