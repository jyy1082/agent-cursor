<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>page-pilot-recorder test fixture</title>
<style>body { user-select: none; }</style>
</head>
<body>
  <button id="submit-btn">Submit</button>
  <button id="stop-btn" data-ppr-ignore>Stop</button>

  <input id="name-input" type="text" />
  <textarea id="bio"></textarea>

  <select id="country-select">
    <option value="">--</option>
    <option value="us">US</option>
    <option value="jp">JP</option>
  </select>

  <input id="agree-checkbox" type="checkbox" />
  <input id="password-field" type="password" />
  <button id="dup-btn">First duplicate</button>
  <button id="dup-btn">Second duplicate</button>
  <button id="dup-btn">Third duplicate</button>
  <input id="radio-a" type="radio" name="grp" value="a" />
  <input id="radio-b" type="radio" name="grp" value="b" />

  <div id="scroll-box" style="height:100px; overflow-y:auto;">
    <div style="height:1000px;">tall content</div>
  </div>

  <button id="plan-trigger">Choose a plan</button>
  <div id="plan-menu" style="display:none;">
    <div class="menu-opt" data-value="basic">Basic</div>
    <div class="menu-opt" data-value="pro">Pro</div>
  </div>

  <!-- Simulates a real bug found with date pickers: a popup appended
       directly to document.body (a common pattern, to avoid CSS
       clipping/z-index issues — bootstrap-datepicker does exactly this)
       that removes itself from body again once dismissed. Clicking
       something UNRELATED afterward must not get merged with this. -->
  <!-- Simulates a real bug found with date pickers: clicking something
       INSIDE an already-open popup (like a day in an open calendar) can
       cause the popup CONTAINER itself — not the clicked item — to be
       removed from <body>. A later, completely unrelated click must not
       get merged with the popup-item click just because <body> is
       technically an "ancestor" of everything on the page. -->
  <div id="already-open-popup" style="display:none;">
    <div id="popup-item">Pick this</div>
  </div>
  <button id="unrelated-btn-after">Unrelated button</button>

  <!-- Reproduces the essential mechanism behind a real bug found with a
       real date picker (bootstrap-datepicker): focus a field (starts
       tracking it), then a SEPARATE click sets that field's value
       directly (no 'input'/'change' event fired at all — exactly how
       that library does it) rather than through actual typing. -->
  <input id="date-field" type="text" />
  <button id="date-set-btn">Pick a date (sets #date-field with no events)</button>

  <div id="drag-source" style="position:absolute; left:20px; top:400px; width:60px; height:30px; background:#378ADD;">Drag</div>
  <div id="drag-target" style="position:absolute; left:300px; top:400px; width:100px; height:60px; border:2px dashed #999;">Drop here</div>

  <button>No Identifiers Button</button>
  <button>Repeated Label</button>
  <button>Repeated Label</button>
  <a href="javascript:void(0)">A Plain Link</a>

  <iframe id="test-iframe" src="/test/recorder/iframe-fixture.html" style="width:300px; height:150px; border:1px solid #ccc;"></iframe>

  <script type="module">
    import { PagePilotRecorder } from '/src/page-pilot-recorder.js';
    window.__recorder = new PagePilotRecorder({ ui: false });
    document.getElementById('stop-btn').addEventListener('click', () => {
      window.__lastSteps = window.__recorder.stop();
    });

    window.__clickedTexts = [];
    document.querySelectorAll('button, a').forEach((el) => {
      if (el.id) return; // only track the plain no-id ones added for text-matching tests
      el.addEventListener('click', () => window.__clickedTexts.push(el.textContent.trim()));
    });

    const planTrigger = document.getElementById('plan-trigger');
    const planMenu = document.getElementById('plan-menu');
    planTrigger.addEventListener('click', () => {
      planMenu.style.display = planMenu.style.display === 'none' ? 'block' : 'none';
    });
    document.querySelectorAll('.menu-opt').forEach((opt) => {
      opt.addEventListener('click', () => {
        planTrigger.textContent = opt.textContent;
        planMenu.style.display = 'none';
      });
    });

    // Simulates the real bug: clicking something INSIDE an already-open
    // popup (like a day in an open calendar) causes the popup CONTAINER
    // itself — appended directly to document.body, exactly what
    // bootstrap-datepicker's calendar does — to be removed from body,
    // not the clicked item itself.
    const alreadyOpenPopup = document.getElementById('already-open-popup');
    document.body.appendChild(alreadyOpenPopup); // move it to be a direct child of body, already open
    alreadyOpenPopup.style.display = 'block';
    document.getElementById('popup-item').addEventListener('click', () => {
      alreadyOpenPopup.remove(); // removes the CONTAINER (not popup-item) from body
    });

    // Reproduces the essential mechanism of the real date-picker bug: sets
    // a value directly with NO event fired at all — no 'input', no
    // 'change' — exactly how bootstrap-datepicker sets the underlying
    // <input> after a calendar day is clicked.
    document.getElementById('date-set-btn').addEventListener('click', () => {
      document.getElementById('date-field').value = '04/15/2022';
    });

    const dragSource = document.getElementById('drag-source');
    const dragTarget = document.getElementById('drag-target');
    let dragging = false, offsetX = 0, offsetY = 0;
    dragSource.addEventListener('mousedown', (e) => {
      dragging = true;
      offsetX = e.clientX - dragSource.getBoundingClientRect().left;
      offsetY = e.clientY - dragSource.getBoundingClientRect().top;
    });
    document.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      dragSource.style.left = (e.clientX - offsetX) + 'px';
      dragSource.style.top = (e.clientY - offsetY) + 'px';
    });
    document.addEventListener('mouseup', (e) => {
      if (!dragging) return;
      dragging = false;
      const tRect = dragTarget.getBoundingClientRect();
      if (e.clientX >= tRect.left && e.clientX <= tRect.right && e.clientY >= tRect.top && e.clientY <= tRect.bottom) {
        dragTarget.textContent = 'Dropped!';
      }
    });
  </script>
</body>
</html>
